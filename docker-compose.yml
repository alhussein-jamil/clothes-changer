# Base stack (CPU-safe). GPU: make docker-up or compose -f docker-compose.gpu.yml up -d
services:
  outfit-studio:
    build: .
    ports:
      - "${OUTFIT_STUDIO_PORT:-7860}:7860"
    env_file:
      - path: .env
        required: false
    environment:
      OUTFIT_STUDIO_HOST: "0.0.0.0"
      OUTFIT_STUDIO_PORT: "7860"
      OUTFIT_STUDIO_DB_PATH: "/app/data/database.db"
      OUTFIT_STUDIO_OUTPUT_DIR: "/app/outputs"
      OUTFIT_STUDIO_MODELS_DIR: "/app/models"
      OUTFIT_STUDIO_REQUIRE_AUTH: "true"
      OUTFIT_STUDIO_ALLOW_BOOTSTRAP_ADMIN: "true"
      OUTFIT_STUDIO_DEFAULT_ADMIN: "${OUTFIT_STUDIO_DEFAULT_ADMIN:-admin}"
      OUTFIT_STUDIO_DEFAULT_PASSWORD: "${OUTFIT_STUDIO_DEFAULT_PASSWORD:-admin1234}"
      OUTFIT_STUDIO_DEFAULT_CREDITS: "${OUTFIT_STUDIO_DEFAULT_CREDITS:-100}"
      OUTFIT_STUDIO_PUBLIC_BASE_URL: "${OUTFIT_STUDIO_PUBLIC_BASE_URL:-http://localhost:7860}"
      OUTFIT_STUDIO_SESSION_COOKIE_SECURE: "${OUTFIT_STUDIO_SESSION_COOKIE_SECURE:-false}"
    volumes:
      - outfit-data:/app/data
      - outfit-outputs:/app/outputs
      - ${OUTFIT_STUDIO_HOST_MODELS_DIR:-./models}:/app/models
      - ${OUTFIT_STUDIO_HOST_HF_CACHE:-${HOME}/.cache/huggingface}:/app/models/huggingface:ro
    restart: unless-stopped

volumes:
  outfit-data:
  outfit-outputs:
