app:
  name: Outfit Studio
  tagline: AI outfit inpainting — replace or edit clothing in photos

prompts:
  default: >-
    high quality photo, detailed fabric texture, natural lighting, realistic clothing,
    sharp focus, professional photography, accurate colors, clean composition
  negative: >-
    worst quality, low quality, blurry, deformed, bad anatomy, extra limbs,
    watermark, text, logo, cropped, jpeg artifacts, oversaturated, overexposed,
    duplicate, mutation, disfigured, poorly drawn hands, poorly drawn face

models:
  # Hugging Face SD1.5 inpaint — works without a local checkpoint file.
  default_inpaint: runwayml/stable-diffusion-inpainting
  human_parser: fashn-ai/fashn-human-parser
  controlnet: lllyasviel/sd-controlnet-openpose

segmentation:
  clothes_confidence: 0.15
  min_component_area: 32
  clothes_edge_grow_px: 7

generation:
  use_controlnet: true
  steps: 24
  guidance_scale: 10.0
  inference_size: 640

pose:
  detection_threshold: 0.5
  keypoint_threshold: 0.3
  mode: balanced
