<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline debug artifact map</title>
  <desc id="desc">A simple map of the debug run folder, segmentation files, generation files, and per-person files.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #fbfaf7; }
    .title { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .sub { font: 400 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
    .root { fill: #172033; }
    .rootText { font: 700 16px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #ffffff; }
    .card { fill: #ffffff; stroke: #d7dde7; stroke-width: 1.2; }
    .head { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .body { font: 400 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5d6678; }
    .code { font: 600 13px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #42526b; }
    .note { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #42526b; }
    .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <rect class="bg" width="1180" height="420"/>
  <text class="title" x="54" y="56">Debug Artifacts</text>
  <text class="sub" x="54" y="83">Turn on pipeline debug to keep the files behind the walkthrough image.</text>

  <rect class="root" x="176" y="118" width="828" height="52" rx="8"/>
  <text class="rootText" x="214" y="150">debug-pipeline/&lt;username&gt;_&lt;timestamp&gt;/</text>

  <path class="arrow" d="M372 170 V205"/>
  <path class="arrow" d="M590 170 V205"/>
  <path class="arrow" d="M808 170 V205"/>

  <g transform="translate(86 214)">
    <rect class="card" width="296" height="144" rx="8"/>
    <rect width="296" height="8" rx="8" fill="#70b7a8"/>
    <text class="head" x="24" y="42">segmentation/</text>
    <text class="body" x="24" y="68">Mask quality checks</text>
    <text class="code" x="24" y="96">fused_person_mask.png</text>
    <text class="code" x="24" y="120">fused_clothes_mask.png</text>
  </g>

  <g transform="translate(442 214)">
    <rect class="card" width="296" height="144" rx="8"/>
    <rect width="296" height="8" rx="8" fill="#83b7e8"/>
    <text class="head" x="24" y="42">generation/</text>
    <text class="body" x="24" y="68">Full-frame inputs and result</text>
    <text class="code" x="24" y="96">masks_overlay.png</text>
    <text class="code" x="24" y="120">final_output.png</text>
  </g>

  <g transform="translate(798 214)">
    <rect class="card" width="296" height="144" rx="8"/>
    <rect width="296" height="8" rx="8" fill="#b8a4e8"/>
    <text class="head" x="24" y="42">person_01/</text>
    <text class="body" x="24" y="68">Crop-level diffusion trace</text>
    <text class="code" x="24" y="96">inpaint_input.png</text>
    <text class="code" x="24" y="120">diffusion_output.png</text>
  </g>

  <rect x="374" y="374" width="432" height="30" rx="8" fill="#fff3df" stroke="#ecc58f"/>
  <text class="note" x="406" y="394">README images are curated copies from one vanilla run.</text>
</svg>
